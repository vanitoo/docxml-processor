name: Unit Tests

on:
  push:
    branches: [main, master]
    paths:
      - '**/*.cs'
      - '**/*.csproj'
      - '**/*.props'
      - '**/*.config'
      - '**/*.sln'
      - '**/*.yml'
  pull_request:
    paths:
      - '**/*.cs'
      - '**/*.csproj'
      - '**/*.props'
      - '**/*.config'
      - '**/*.sln'
      - '**/*.yml'

env:
  DOTNET_VERSION: '7.0.404'
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ProcessingCommon.Tests
            project: ProcessingCommon.Tests/ProcessingCommon.Tests.csproj
          - name: XsltProcessor.Tests
            project: XsltProcessor.Tests/XsltProcessor.Tests.csproj
          - name: PdfProcessor.Tests
            project: PdfProcessor.Tests/PdfProcessor.Tests.csproj
          - name: OldFIleWatcher.Tests
            project: OldFIleWatcher.Tests/OldFIleWatcher.Tests.csproj
          - name: DocumentXmlProcessorContext.Tests
            project: DocumentXmlProcessorContext.Tests/DocumentXmlProcessorContext.Tests.csproj
          - name: DocumentXmlProcessorAPI.Tests
            project: DocumentXmlProcessorAPI.Tests/DocumentXmlProcessorAPI.Tests.csproj

    name: ${{ matrix.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ${{ matrix.project }}

      - name: Build
        run: dotnet build ${{ matrix.project }} --no-restore --verbosity minimal

      - name: Test
        run: dotnet test ${{ matrix.project }} --no-build --verbosity normal
        