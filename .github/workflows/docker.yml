name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.vars.outputs.publish }}
      image_repo: ${{ steps.vars.outputs.image_repo }}
      version: ${{ steps.vars.outputs.version }}
      short_sha: ${{ steps.vars.outputs.short_sha }}
      ref_name_safe: ${{ steps.vars.outputs.ref_name_safe }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare variables
        id: vars
        shell: bash
        run: |
          IMAGE_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA="${GITHUB_SHA::7}"
          REF_NAME_SAFE=$(echo "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            PUBLISH=false
          else
            PUBLISH=true
          fi

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(date -u +'%Y.%m.%d-%H%M%S')-${{ github.run_number }}-${SHORT_SHA}"
          fi

          echo "publish=$PUBLISH" >> "$GITHUB_OUTPUT"
          echo "image_repo=$IMAGE_REPO" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "ref_name_safe=$REF_NAME_SAFE" >> "$GITHUB_OUTPUT"

      - name: Debug info
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "github.ref=${{ github.ref }}"
          echo "github.ref_name=${{ github.ref_name }}"
          echo "publish=${{ steps.vars.outputs.publish }}"
          echo "image_repo=${{ steps.vars.outputs.image_repo }}"
          echo "version=${{ steps.vars.outputs.version }}"
          echo "short_sha=${{ steps.vars.outputs.short_sha }}"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - file_watcher
          - pdf_processor
          - xslt_processor
          - api_processor

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: needs.prepare.outputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare tags
        id: tags
        shell: bash
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_repo }}/${{ matrix.service }}"

          TAGS="${IMAGE}:${{ needs.prepare.outputs.version }}"

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            TAGS="${TAGS}"$'\n'"${IMAGE}:latest"
          fi

          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Final tags:"
          echo "$TAGS"

      - name: Build and optionally push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile-${{ matrix.service }}
          push: ${{ needs.prepare.outputs.publish == 'true' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_CONFIGURATION=Release
          labels: |
            org.opencontainers.image.title=${{ matrix.service }}
            org.opencontainers.image.description=${{ matrix.service }} service image
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}

  notify:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Print result
        run: |
          echo "publish=${{ needs.prepare.outputs.publish }}"
          echo "version=${{ needs.prepare.outputs.version }}"
          echo "build_result=${{ needs.build.result }}"

      - name: Success notification
        if: needs.build.result == 'success'
        run: |
          if [[ "${{ needs.prepare.outputs.publish }}" == "true" ]]; then
            echo "✅ Images built and pushed successfully."
            echo "Version: ${{ needs.prepare.outputs.version }}"
            echo "Tags: latest, ${{ needs.prepare.outputs.version }}"
          else
            echo "✅ Pull request build completed successfully (no push)."
          fi

      - name: Failure notification
        if: needs.build.result == 'failure'
        run: echo "❌ Build failed. Check GitHub Actions logs."
        
  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && needs.build.result == 'success'
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true        


          