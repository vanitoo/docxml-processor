name: Code Quality

on:
  push:
    branches: [main, master]
    paths:
      - '**/*.cs'
      - '**/*.csproj'
      - '**/*.props'
      - '**/*.config'
      - '**/*.sln'
      - '**/*.yml'
  pull_request:
    paths:
      - '**/*.cs'
      - '**/*.csproj'
      - '**/*.props'
      - '**/*.config'
      - '**/*.sln'
      - '**/*.yml'

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.410'

      - name: Show .NET info
        run: dotnet --info

      - name: Create NuGet package directory
        run: mkdir -p "$NUGET_PACKAGES"

      - name: Restore dependencies
        run: dotnet restore ./document-xml-processor.sln

      - name: Build solution
        run: dotnet build ./document-xml-processor.sln --no-restore --verbosity minimal

      - name: Install Roslynator
        run: dotnet tool install --global Roslynator.DotNet.Cli --version 4.6.1

      - name: Run Roslynator
        shell: bash
        run: |
          set -o pipefail
          export PATH="$PATH:$HOME/.dotnet/tools"
          roslynator analyze ./document-xml-processor.sln --severity warning --visibility internal,public 2>&1 | tee roslynator.log

      - name: Upload Roslynator results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: roslynator-results
          path: roslynator.log
          retention-days: 7

  formatting:
    runs-on: ubuntu-latest
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.410'

      - name: Show .NET info
        run: dotnet --info

      - name: Create NuGet package directory
        run: mkdir -p "$NUGET_PACKAGES"

      - name: Restore dependencies
        run: dotnet restore ./document-xml-processor.sln

      - name: Run formatting check
        shell: bash
        run: |
          set -o pipefail
          dotnet format ./document-xml-processor.sln --no-restore --verify-no-changes --verbosity diagnostic 2>&1 | tee dotnet-format.log

      - name: Upload formatting results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-format-results
          path: dotnet-format.log
          retention-days: 7
          