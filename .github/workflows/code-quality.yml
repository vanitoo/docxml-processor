name: Code Quality

on:
  push:
    branches:
      - main
      - master
    paths:
      - '**/*.cs'
      - '**/*.csproj'
      - '**/*.props'
      - '**/*.config'
      - '**/*.sln'
  pull_request:
    paths:
      - '**/*.cs'
      - '**/*.csproj'
      - '**/*.props'
      - '**/*.config'
      - '**/*.sln'

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Restore dependencies
        run: dotnet restore ./document-xml-processor.sln

      - name: Build solution
        run: dotnet build ./document-xml-processor.sln --no-restore --verbosity minimal

      - name: Install Roslynator
        run: dotnet tool install --global Roslynator.DotNet.Cli --version 4.6.1

      - name: Run Roslynator
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          roslynator analyze ./document-xml-processor.sln --severity warning --visibility internal,public 2>&1 | tee roslynator.log

      - name: Upload Roslynator results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: roslynator-results
          path: roslynator.log
          retention-days: 7

  formatting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Restore dependencies
        run: dotnet restore ./document-xml-processor.sln

      - name: Check code formatting
        run: dotnet format ./document-xml-processor.sln --verify-no-changes --verbosity diagnostic